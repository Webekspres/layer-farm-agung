openapi: 3.1.0
info:
  title: AAPM Mobile API
  version: 1.0.0
  description: |
    Kontrak API untuk aplikasi mobile **Layered Farm Agung (AAPM)** — operasional kandang.

    - **Base path operasional:** `/api/v1/*`
    - **Autentikasi:** [Better Auth](https://www.better-auth.com/) session cookie setelah login via `/api/auth/*`
    - **Format respons:** envelope JSON standar (lihat komponen `ApiSuccess` / `ApiError`)
    - **Implementasi server:** `app/api/v1/` di repo Next.js admin

    Sumber kebenaran runtime: route handlers + `features/*/schemas/` + `lib/api/response.ts`.
  contact:
    name: Layered Farm Agung — tim pengembangan

servers:
  - url: http://localhost:3000
    description: Development lokal
  - url: http://127.0.0.1:3000
    description: Development lokal (IPv4)
  - url: "{scheme}://{host}"
    description: LAN / staging / production (ganti host, mis. IP mesin dev untuk Expo fisik)
    variables:
      scheme:
        default: http
        enum: [http, https]
      host:
        default: 192.168.1.100:3000

tags:
  - name: Auth
    description: |
      Handlers Better Auth di `/api/auth/*`. Bukan bagian dari envelope `ApiSuccess` v1.
      Mobile client harus menyimpan dan mengirim session cookie pada setiap panggilan `/api/v1/*`.
  - name: Cages
    description: Daftar dan detail kandang untuk layar home & QR scan
  - name: Catalog
    description: Data referensi global (grade telur, dll.)
  - name: Production
    description: Pencatatan produksi telur harian
  - name: Feed
    description: Konsumsi pakan — **belum diimplementasi** (501)

security:
  - cookieAuth: []

paths:
  /api/auth/sign-in/username:
    post:
      tags: [Auth]
      summary: Login dengan username
      description: |
        Endpoint Better Auth (plugin `username`). Mengembalikan session cookie `Set-Cookie`
        yang wajib dikirim ulang ke `/api/v1/*` dengan `credentials: include`.

        Peran **staff** (`staff.kandang`) memiliki permission `manage_production` dan
        `manage_inventory` untuk operasional mobile.
      operationId: signInWithUsername
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignInUsernameRequest"
            example:
              username: staff.kandang
              password: password123
      responses:
        "200":
          description: Login berhasil — session cookie diset
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BetterAuthSessionResponse"
        "401":
          description: Kredensial tidak valid
        "403":
          description: Akun atau tenant tidak aktif

  /api/auth/sign-in/email:
    post:
      tags: [Auth]
      summary: Login dengan email
      operationId: signInWithEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignInEmailRequest"
      responses:
        "200":
          description: Login berhasil — session cookie diset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BetterAuthSessionResponse"
        "401":
          description: Kredensial tidak valid

  /api/auth/get-session:
    get:
      tags: [Auth]
      summary: Cek session aktif
      operationId: getSession
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Session valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BetterAuthSessionResponse"
        "401":
          description: Tidak ada session

  /api/v1/cages:
    get:
      tags: [Cages]
      summary: Daftar kandang aktif tenant
      description: |
        Mengembalikan semua kandang `Active` pada tenant session, termasuk flag
        `recordedToday` untuk progress input harian.
      operationId: listCages
      responses:
        "200":
          description: Berhasil
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/FieldCageStats"
              example:
                success: true
                message: Daftar kandang berhasil dimuat.
                data:
                  totalActive: 2
                  recordedTodayCount: 1
                  cages:
                    - id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                      name: Kandang A1
                      locationName: Farm Utama
                      strainName: Lohmann Brown
                      cageType: Closed House (Battery)
                      capacity: 5000
                      status: Active
                      activeCyclePopulation: 4800
                      recordedToday: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/cages/scan:
    post:
      tags: [Cages]
      summary: Validasi scan QR kandang
      description: |
        Memvalidasi payload QR (deep link `aapmmobile://kandang/{qr_code}/produksi` atau token `KDG…`).
        Staff harus ditugaskan ke kandang; kandang harus aktif dengan siklus berjalan.
      operationId: scanCageQr
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payload]
              properties:
                payload:
                  type: string
                  description: Teks mentah dari QR (URL deep link atau token)
            example:
              payload: aapmmobile://kandang/KDG4F8A2B1C0D3/produksi
      responses:
        "200":
          description: Kandang valid untuk input produksi
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CageForProduction"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/cages/{cageId}:
    get:
      tags: [Cages]
      summary: Detail kandang untuk form produksi
      description: |
        Dipakai setelah scan QR berhasil. Memerlukan penugasan staff ke kandang
        dan siklus aktif (`aapmmobile://kandang/{qr_code}/produksi`).
      operationId: getCageById
      parameters:
        - $ref: "#/components/parameters/CageId"
      responses:
        "200":
          description: Berhasil
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CageForProduction"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/egg-grades:
    get:
      tags: [Catalog]
      summary: Daftar grade telur
      description: Katalog global untuk dropdown form produksi.
      operationId: listEggGrades
      responses:
        "200":
          description: Berhasil
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/EggGradeOption"
              example:
                success: true
                message: Daftar grade telur berhasil dimuat.
                data:
                  - id: 1
                    name: Grade A
                  - id: 2
                    name: Grade B
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/production:
    post:
      tags: [Production]
      summary: Catat produksi telur harian
      description: |
        Catat satu entri panen harian dengan bucket TB (telur bagus), TR (telur retak), TP (telur pecah).
        Boleh lebih dari satu entri per kandang per hari (mis. pagi/sore).
        Validasi bisnis: kandang aktif, siklus aktif, total `tb + tr + tp >= 1`,
        maksimal 10.000 butir per field.
      operationId: recordDailyProduction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyProductionInput"
            example:
              cageId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
              recordDate: "2026-06-04"
              tb: 1200
              tr: 30
              tp: 15
              weight: 72.5
      responses:
        "201":
          description: Produksi tercatat
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RecordProductionResult"
              example:
                success: true
                message: Produksi harian berhasil dicatat.
                data:
                  recorded: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/feed-consumption:
    post:
      tags: [Feed]
      summary: Catat konsumsi pakan
      description: |
        **Belum diimplementasi** — server mengembalikan `501` sampai service domain
        inventori siap. Skema request di bawah adalah target kontrak.
      operationId: recordFeedConsumption
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedConsumptionInput"
      responses:
        "201":
          description: Konsumsi tercatat (rencana)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RecordFeedConsumptionResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          description: Endpoint belum tersedia
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                success: false
                error: Endpoint konsumsi pakan belum tersedia. Layanan domain sedang dalam pengembangan.

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: better-auth.session_token
      description: |
        Session cookie Better Auth. Nama cookie dapat berbeda per konfigurasi —
        periksa header `Set-Cookie` setelah login. Kirim dengan `credentials: 'include'`.

  parameters:
    CageId:
      name: cageId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: UUID kandang (`Cage.id`)

  responses:
    Unauthorized:
      description: Session tidak ada atau kedaluwarsa
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            success: false
            error: Unauthorized
    Forbidden:
      description: Tidak punya permission atau tenant aktif belum dipilih
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            success: false
            error: Forbidden
    NotFound:
      description: Resource tidak ditemukan di tenant
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            success: false
            error: Kandang tidak ditemukan di tenant ini.
    BadRequest:
      description: Validasi gagal atau aturan bisnis ditolak
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            success: false
            error: Isi jumlah telur layak atau telur pecah minimal 1 butir.

  schemas:
    ApiSuccess:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          const: true
        message:
          type: string
          description: Pesan sukses (Bahasa Indonesia)
        data:
          description: Payload spesifik endpoint

    ApiError:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          const: false
        error:
          type: string
          description: Detail error (Bahasa Indonesia)

    SignInUsernameRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1

    SignInEmailRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    BetterAuthSessionResponse:
      type: object
      description: |
        Bentuk respons Better Auth — dapat berubah mengikuti versi library.
        Lihat dokumentasi Better Auth untuk field lengkap.
      properties:
        user:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            email:
              type: string
        session:
          type: object
          properties:
            id:
              type: string
            expiresAt:
              type: string
              format: date-time

    FieldCageListItem:
      type: object
      required:
        - id
        - name
        - locationName
        - strainName
        - capacity
        - status
        - recordedToday
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        locationName:
          type: string
        strainName:
          type: string
        cageType:
          type: string
          nullable: true
          description: Preset tipe kandang, mis. `Closed House (Battery)`
        capacity:
          type: integer
          minimum: 0
        status:
          type: string
          enum: [Active, Inactive]
        activeCyclePopulation:
          type: integer
          nullable: true
          description: Populasi awal siklus aktif
        recordedToday:
          type: boolean
          description: Sudah ada entri produksi hari ini untuk kandang ini

    FieldCageStats:
      type: object
      required: [cages, totalActive, recordedTodayCount]
      properties:
        cages:
          type: array
          items:
            $ref: "#/components/schemas/FieldCageListItem"
        totalActive:
          type: integer
          minimum: 0
        recordedTodayCount:
          type: integer
          minimum: 0

    CageForProduction:
      type: object
      required:
        - id
        - name
        - locationName
        - strainName
        - status
        - hasActiveCycle
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        locationName:
          type: string
        strainName:
          type: string
        status:
          type: string
        hasActiveCycle:
          type: boolean
        activeCyclePopulation:
          type: integer
          nullable: true

    EggGradeOption:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    DailyProductionInput:
      type: object
      required: [cageId, recordDate]
      properties:
        cageId:
          type: string
          format: uuid
        recordDate:
          type: string
          format: date
          description: Tanggal panen (ISO 8601 date)
        tb:
          type: integer
          minimum: 0
          maximum: 10000
          default: 0
          description: Telur bagus (butir)
        tr:
          type: integer
          minimum: 0
          maximum: 10000
          default: 0
          description: Telur retak (butir)
        tp:
          type: integer
          minimum: 0
          maximum: 10000
          default: 0
          description: Telur pecah (butir)
        weight:
          type: number
          format: float
          minimum: 0
          description: Total berat telur (kg), opsional

    RecordProductionResult:
      type: object
      required: [recorded]
      properties:
        recorded:
          type: boolean
          const: true

    FeedConsumptionInput:
      type: object
      description: Kontrak rencana — belum divalidasi server
      required: [cageId, itemId, recordDate, quantity]
      properties:
        cageId:
          type: string
          format: uuid
        itemId:
          type: string
          format: uuid
          description: Item pakan (`Item.id`)
        recordDate:
          type: string
          format: date
        quantity:
          type: number
          format: float
          minimum: 0
          description: Jumlah pakan (satuan sesuai master item)

    RecordFeedConsumptionResult:
      type: object
      description: Kontrak rencana
      properties:
        recorded:
          type: boolean
